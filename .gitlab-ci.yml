workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: popyfebrian/sinnoerp
  DOCKER_TLS_CERTDIR: "/certs"
  DEPLOY_HOST: "103.28.219.88"
  DEPLOY_USER: "admpratesis"
  DEPLOY_PATH: "/home/admpratesis/sinnoerp"

default:
  interruptible: true

phpunit:
  stage: test
  image: php:8.4-cli-alpine
  before_script:
    - apk add --no-cache git unzip libzip-dev icu-dev oniguruma-dev postgresql-dev sqlite-dev
    - docker-php-ext-install pdo pdo_pgsql pdo_sqlite zip intl mbstring bcmath pcntl
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - cp .env.example .env
    - composer install --no-interaction --prefer-dist --optimize-autoloader
    - php artisan key:generate --ansi
    - touch database/database.sqlite
  script:
    - php artisan test --ansi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-and-push:
  stage: build
  image: docker:27-cli
  services:
    - docker:27-dind
  needs:
    - job: phpunit
  before_script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"
  script:
    - export IMAGE_TAG="${CI_COMMIT_SHORT_SHA:-latest}"
    - docker build -t "$DOCKER_IMAGE:$IMAGE_TAG" -t "$DOCKER_IMAGE:latest" .
    - docker push "$DOCKER_IMAGE:$IMAGE_TAG"
    - docker push "$DOCKER_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-production:
  stage: deploy
  image: alpine:3.21
  needs:
    - job: build-and-push
  retry:
    max: 2
    when:
      - runner_system_failure
      - script_failure
  before_script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
      scp docker-compose.prod.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/docker-compose.yml"
    - |
      ssh "${DEPLOY_USER}@${DEPLOY_HOST}" << EOF
        set -e
        cd "${DEPLOY_PATH}"

        if [ ! -f .env ]; then
          echo "ERROR: ${DEPLOY_PATH}/.env not found on server."
          echo "Create it once before the first automatic deploy."
          exit 1
        fi

        docker login -u "${DOCKERHUB_USERNAME}" -p "${DOCKERHUB_TOKEN}"
        docker compose pull
        docker compose up -d --remove-orphans
        docker compose exec -T app php artisan migrate --force --no-ansi
        docker compose exec -T app php artisan config:cache --no-ansi
        docker compose exec -T app php artisan route:cache --no-ansi
        docker compose exec -T app php artisan view:cache --no-ansi
        docker image prune -f
      EOF
  environment:
    name: production
    url: http://103.28.219.88:8080
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
